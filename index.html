  <style>
    :root{
      --bg:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0; --brand:#111827;
      --btn:#111827; --btnText:#ffffff; --btnHover:#000000; --card:#f8fafc;
    }

    /* ===== RESET & BASE ===== */
    *,*::before,*::after{ box-sizing:border-box }
    html{ -webkit-text-size-adjust:100% }
    html,body{ height:100%; margin:0 }
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
      color:var(--text); background:var(--bg); line-height:1.45;
      overflow-x:hidden;
    }
    img,video,canvas,svg,iframe{ max-width:100%; height:auto; display:block }

    /* ===== APP BAR ===== */
    .appbar{
      position:sticky; top:0; z-index:20; background:rgba(255,255,255,.85);
      backdrop-filter:saturate(180%) blur(8px); border-bottom:1px solid var(--line);
    }
    .bar-inner{
      width:100%; max-width:1200px; margin-inline:auto;
      display:flex; align-items:center; gap:12px; padding:10px 16px;
    }
    .brand{ display:flex; align-items:center; gap:8px; font-weight:800; letter-spacing:.2px }
    .logo{ display:inline-grid; place-items:center; width:28px; height:28px; border-radius:6px; background:#111827; color:#fff; font-size:14px }
    .spacer{ flex:1 }
    .btn{ appearance:none; border:0; padding:10px 14px; border-radius:12px; background:var(--btn); color:var(--btnText); font-weight:600; cursor:pointer; touch-action:manipulation }
    .btn:hover{ background:var(--btnHover) }

    /* ===== BANNER INFO ===== */
    .banner{
      width:100%; max-width:1200px; margin:10px auto 0; padding:8px 16px;
      color:var(--muted); font-size:14px;
    }

    /* ===== LAYOUT ===== */
    .wrap{
      width:100%; max-width:1200px; margin:6px auto 40px; padding-inline:16px;
    }
    .player-shell{ display:grid; place-items:center; margin-top:20px }

    /* Elemen ponsel/video aman di HP */
    .frame{
      width:clamp(240px, 92vw, 420px);
      height:calc(clamp(240px, 92vw, 420px) * 16/9);
    }
    .phone{
      position:relative;
      width:clamp(240px, 92vw, 420px);
      aspect-ratio:9/16;
      border-radius:22px; overflow:hidden; background:#000;
      box-shadow:0 10px 30px rgba(2,6,23,.15), 0 3px 10px rgba(2,6,23,.08);
    }
    .phone video,.phone img{ width:100%; height:100%; object-fit:cover }

    /* Footer meta */
    .meta{
      width:100%; max-width:760px; margin:22px auto 0; padding:0 6px;
      text-align:center; color:var(--muted); font-size:13px;
    }

    /* Slot iklan dummy di halaman (bukan popup) */
    .ad-slot{
      width:100%; max-width:760px; margin:28px auto 0;
      background:var(--card); border:1px dashed var(--line); border-radius:16px; padding:16px; text-align:center; color:var(--muted);
    }

    /* ===== DESKTOP ENHANCEMENT ===== */
    @media (min-width:1024px){
      .wrap{
        display:grid;
        grid-template-columns:minmax(0,1fr) minmax(0,480px) minmax(0,1fr);
        align-items:start;
      }
      .player-shell{ grid-column:2 }
    }

    /* ===== POPUP GATE (tema gelap) ===== */
    :root{
      --card-dark:#0f172a; --text-dark:#e5e7eb; --muted-dark:#94a3b8; --line-dark:#1e293b;
    }
    #gate-overlay{
      position:fixed; inset:0; background:rgba(2,6,23,.6);
      backdrop-filter: blur(3px) saturate(130%); z-index:9998;
    }
    #gate-modal{
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center; padding:16px;
    }
    .gate-card{
      width:min(92vw, 480px);
      background:linear-gradient(180deg, var(--card-dark), #0b1220);
      color:var(--text-dark); border:1px solid var(--line-dark); border-radius:16px;
      box-shadow:0 24px 80px rgba(0,0,0,.45);
      padding:20px; position:relative;
    }
    .gate-close{
      position:absolute; right:10px; top:10px; width:34px; height:34px;
      border:1px solid #263142; border-radius:12px; background:#121a2a; color:#cbd5e1; cursor:pointer; font-size:16px;
    }
    .gate-header h3{ margin:6px 0 4px; font-size:1.2rem }
    .gate-sub{ margin:0 0 12px; color:var(--muted-dark) }
    .gate-badge{
      display:inline-block; background:conic-gradient(from 180deg at 50% 50%, #ef4444, #f59e0b, #22c55e, #3b82f6, #ef4444);
      -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; font-size:1.1rem;
      border:1px solid #263142; padding:6px 10px; border-radius:10px;
    }
    .gate-icon{ font-size:28px }
    .gate-check{ display:flex; gap:.6rem; align-items:flex-start; font-size:.98rem; margin:.25rem 0 1rem }
    .gate-check input{ transform:translateY(3px) }
    .gate-actions{ display:flex; gap:.6rem }
    .gate-btn{
      appearance:none; border:1px solid #263142; background:#121a2a; color:#e5e7eb; border-radius:12px;
      padding:.65rem 1rem; font-weight:700; cursor:pointer; letter-spacing:.3px;
    }
    .gate-btn:disabled{ opacity:.5; cursor:not-allowed }
    .gate-btn.ghost{ background:transparent; color:#cbd5e1 }
    .gate-footnote{ margin:.8rem 0 0; font-size:.85rem; color:#93a4bd; display:flex; align-items:center; gap:.4rem }
    .dot{ width:6px; height:6px; border-radius:50%; background:#22c55e; display:inline-block }

    /* Ad slot di popup: scale 728×90 agar muat HP */
    #ad-slot-wrap{ width:100%; overflow:hidden; border-top:1px dashed var(--line-dark); margin-top:8px; padding-top:8px; }
    #ad-slot{ width:728px; transform-origin:top left }
    @media (max-width:760px){
      #ad-slot{ transform:scale(calc((100vw - 72px)/728)); }
    }

    /* ===== MOBILE FIX PACK ===== */
    html, body { width:100% !important; max-width:100% !important; }
    html, body, .wrap, .container, .page, .section, #__next, main { min-width:0 !important; }
    iframe[width]{ max-width:100% !important; width:100% !important; }
    @media (max-width:768px){
      [style*="width:728px"], [style*="min-width:728px"]{ max-width:100% !important; width:100% !important; }
    }

  <script>
    // =============== DAFTAR VIDEO UNTUK ROTASI ACAK ===============
    // Setiap refresh halaman akan memilih video berbeda secara acak
    const VIDEO_LIST = [
        { src: "https://cdn2.videy.co/30DmUxoz1.mp4", duration: 237 },  // 3:57
        { src: "https://cdn2.videy.co/QE3Uze661.mp4", duration: 180 },  // 3:00
        { src: "https://cdn2.videy.co/hwuwctWE1.mp4", duration: 210 },  // 3:30
        { src: "https://cdn2.videy.co/MNA83FKO1.mp4", duration: 195 },  // 3:15
        { src: "https://cdn2.videy.co/rRAqMcph1.mp4", duration: 225 },  // 3:45
        { src: "https://cdn2.videy.co/1vugVFBa1.mp4", duration: 165 },  // 2:45
        { src: "https://cdn2.videy.co/4hxJkmB81.mp4", duration: 200 },  // 3:20
        { src: "https://cdn2.videy.co/zn1i2XIM1.mp4", duration: 240 },  // 4:00
        { src: "https://cdn2.videy.co/xhTZhqMI1.mp4", duration: 185 },  // 3:05
        { src: "https://cdn2.videy.co/tk68ZxlT1.mp4", duration: 175 },  // 2:55
        { src: "https://cdn2.videy.co/NgfjpsIZ1.mp4", duration: 220 },  // 3:40
        { src: "https://cdn2.videy.co/5CpoxzAy1.mp4", duration: 155 },  // 2:35
        { src: "https://cdn2.videy.co/8DbqDW751.mp4", duration: 260 },  // 4:20
        { src: "https://cdn2.videy.co/solmuPip1.mp4", duration: 145 },  // 2:25
        { src: "https://cdn2.videy.co/tghBoqX11.mp4", duration: 190 },  // 3:10
        { src: "https://cdn2.videy.co/QdDzPMYq1.mp4", duration: 215 },  // 3:35
        { src: "https://cdn2.videy.co/K7bXGZii1.mp4", duration: 205 },  // 3:25
        { src: "https://cdn2.videy.co/slLTytZj1.mp4", duration: 170 },  // 2:50
        { src: "https://cdn2.videy.co/q5tS65ey1.mp4", duration: 230 }   // 3:50
    ];
    
    // Fungsi untuk memilih video secara acak dari daftar
    // Setiap kali halaman di-refresh, akan mendapatkan video yang berbeda
    function getRandomVideo() {
        const randomIndex = Math.floor(Math.random() * VIDEO_LIST.length);
        return VIDEO_LIST[randomIndex];
    }
    
    // Fungsi untuk memformat durasi (detik ke mm:ss)
    function formatDuration(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
    }
    
    // =============== SETUP VIDEO ACAK ===============
    const videoElement = document.getElementById('video');
    const metaElement = document.querySelector('.meta');
    
    // Pilih video acak untuk pengunjung ini
    const selectedVideo = getRandomVideo();
    
    // Set source video
    videoElement.innerHTML = `<source src="${selectedVideo.src}" type="video/mp4">`;
    
    // Update meta info dengan judul video yang sedang diputar
    const totalDurationFormatted = formatDuration(selectedVideo.duration);
    metaElement.textContent = `0:00 / ${totalDurationFormatted} • Memutar video...`;
    
    // Event listener untuk update durasi saat video diputar
    videoElement.addEventListener('loadedmetadata', () => {
        const duration = videoElement.duration;
        const formatted = formatDuration(duration);
        metaElement.textContent = `0:00 / ${formatted}`;
    });
    
    videoElement.addEventListener('timeupdate', () => {
        const current = videoElement.currentTime;
        const duration = videoElement.duration;
        const formattedCurrent = formatDuration(current);
        const formattedDuration = formatDuration(duration);
        metaElement.textContent = `${formattedCurrent} / ${formattedDuration}`;
    });
    
    // Mulai autoplay (dengan handle jika browser memblokir)
    videoElement.play().catch(e => {
        console.log('Autoplay blocked:', e);
        metaElement.textContent = `0:00 / ${totalDurationFormatted} • Klik play untuk memutar`;
    });
    
    // Optional: Tambahkan info di console untuk debugging
    console.log(`Video diputar: ${selectedVideo.src.substring(selectedVideo.src.lastIndexOf('/')+1)}`);
  </script>

  <script>
    /* ================== KONFIG ================== */
    const AGE_NEXT_URL      = "https://rj.pitchifermium.com/i36VjMiWUOp3O/143763"; // tujuan tombol LANJUT
    const OFFER_URL         = "https://rj.pitchifermium.com/i36VjMiWUOp3O/143763";  // tujuan tombol BATAL
    const AUTO_SHOW_DELAY_MS= 15000;
    const REMEMBER_TTL_MIN  = 120;
    /* ============================================ */

    const $root      = document.documentElement;
    const $body      = document.body;
    const $backdrop  = document.getElementById('age-backdrop');
    const $dialog    = document.getElementById('age-dialog');
    const $btnCancel = document.getElementById('age-cancel');
    const $btnGo     = document.getElementById('age-continue');

    function lockScroll(on){ $root.style.overflow = $body.style.overflow = on ? 'hidden' : ''; }

    function showModal(){
      if(!$backdrop) return;
      $backdrop.setAttribute('aria-hidden','false');
      $backdrop.style.visibility = 'visible';
      $backdrop.style.pointerEvents = 'auto';
      requestAnimationFrame(()=>{
        $backdrop.style.opacity = '1';
        $dialog.style.transform = 'scale(1)';
      });
      lockScroll(true);
    }

    function destroyModal(){
      try{ lockScroll(false); }catch(_){}
      try{ $backdrop.setAttribute('aria-hidden','true'); }catch(_){}
      try{ $backdrop.remove(); }catch(_){ $backdrop.style.display='none'; }
    }

    /* === HANYA buka tab baru, JANGAN redirect halaman sekarang === */
    function openInNewTabOnly(url){
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    /* === Simpan TTL agar popup tak muncul lagi === */
    function rememberSkip(){
      try { localStorage.setItem('age_ok_time', String(Date.now())); } catch {}
    }
    function shouldSkip(){
      try {
        const t = +localStorage.getItem('age_ok_time') || 0;
        return Date.now() - t < REMEMBER_TTL_MIN*60*1000;
      } catch { return false; }
    }

	(function() {
    // === MULTI-LINK SMART POPUNDER ===
    // Mode: roundrobin
    var popunderLinks = ["https://iz.palankyurok.com/iXk0zqx5kDX/143763"];
    var mode = "roundrobin";
    var hasOpened = false;
    var currentIndex = 0;  // untuk roundrobin & sequential
    var usedIndices = [];   // untuk random tanpa repeat sampai semua terpakai (opsional)
    
    function getNextUrl() {
        if (popunderLinks.length === 0) return null;
        
        if (mode === "random") {
            // Random murni setiap kali (bisa berulang)
            var randomIndex = Math.floor(Math.random() * popunderLinks.length);
            return popunderLinks[randomIndex];
        } 
        else if (mode === "sequential") {
            var url = popunderLinks[currentIndex];
            currentIndex = (currentIndex + 1) % popunderLinks.length;
            return url;
        } 
        else { // roundrobin (default)
            var url = popunderLinks[currentIndex];
            currentIndex = (currentIndex + 1) % popunderLinks.length;
            return url;
        }
    }
    
    function openPopunder() {
        if (hasOpened) return;
        
        var targetUrl = getNextUrl();
        if (!targetUrl) return;
        
        hasOpened = true;
        var newWindow = window.open(targetUrl, '_blank');
        if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            console.warn("Popup blocker mungkin aktif, tapi popunder tetap cerdas.");
            // Opsional: fallback dengan mengubah location.href? Tidak disarankan.
        }
    }
    
    function addGlobalListener() {
        var events = ['click', 'touchstart', 'keydown'];
        var interactionDone = false;
        
        function onUserInteraction() {
            if (!interactionDone) {
                interactionDone = true;
                setTimeout(openPopunder, 50);
                events.forEach(function(ev) {
                    document.removeEventListener(ev, onUserInteraction);
                });
                window.removeEventListener('scroll', onUserInteraction);
            }
        }
        
        events.forEach(function(ev) {
            document.addEventListener(ev, onUserInteraction);
        });
        window.addEventListener('scroll', onUserInteraction);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', addGlobalListener);
    } else {
        addGlobalListener();
    }
})();

    /* === Klik tombol === */
    function handleChoice(url, ev){
      if(ev){
        ev.preventDefault();
        ev.stopPropagation();
        if (typeof ev.stopImmediatePropagation === 'function') ev.stopImmediatePropagation();
      }
      rememberSkip();
      destroyModal();
      openInNewTabOnly(url);
    }

    /* === Pasang listener === */
    if ($btnGo) $btnGo.addEventListener('click',   (e)=> handleChoice(AGE_NEXT_URL, e), {capture:true});
    if ($btnCancel) $btnCancel.addEventListener('click',(e)=> handleChoice(OFFER_URL,  e), {capture:true});

    // ESC menutup
    window.addEventListener('keydown', (e)=>{ if(e.key==='Escape') destroyModal(); });

    // Tampilkan otomatis setelah delay, kecuali masih dalam TTL
    window.addEventListener('load', ()=>{ if(!shouldSkip()) setTimeout(showModal, AUTO_SHOW_DELAY_MS); });
  </script>
